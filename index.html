<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vantage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #0f0f0f;
        font-family: 'Inter', system-ui, sans-serif;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }

      #root { height: 100%; width: 100%; }

      /* Loading screen — viditelný dokud React nepřepíše #root */
      #splash {
        position: fixed;
        inset: 0;
        background: #0f0f0f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }

      #splash.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .splash-logo {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .splash-logo svg {
        color: #ff4655;
      }

      .splash-logo span {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.2em;
        color: #ffffff;
      }

      /* Tři tečky animace */
      .splash-dots {
        display: flex;
        gap: 6px;
      }

      .splash-dots span {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #333;
        animation: dot-pulse 1.2s ease-in-out infinite;
      }

      .splash-dots span:nth-child(1) { animation-delay: 0s; }
      .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      .splash-dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes dot-pulse {
        0%, 80%, 100% { background: #333; transform: scale(1); }
        40%            { background: #ff4655; transform: scale(1.3); }
      }
    </style>
  </head>
  <body>

    <!-- Splash — okamžitě viditelný, skryje se po načtení Reactu -->
    <div id="splash">
      <div class="splash-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M4 4L12 20L14 16L10 8H16L20 4H4Z" fill="#ff4655" />
        </svg>
        <span>VANTAGE</span>
      </div>
      <div class="splash-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/ui/main.tsx"></script>
  </body>
</html>
